# Prometheus — scrape prediction API (run API on host :8010 before starting stack)
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: scout-prediction-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8010
    relabel_configs:
      - target_label: service
        replacement: scout-api
